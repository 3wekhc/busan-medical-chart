<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산 구·군별 고령화율과 고령인구 대비 의사 수</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #F4F3F0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}
.card {
  background: #FFFFFF;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.07);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  padding: 2rem 2rem 1.5rem;
  width: 100%;
  max-width: 760px;
}
.chart-title {
  font-size: 20px;
  font-weight: 600;
  color: #1A1A18;
  text-align: center;
  letter-spacing: -0.3px;
  margin-bottom: 5px;
}
.chart-sub {
  text-align: center;
  font-size: 13px;
  color: #73726C;
  margin-bottom: 18px;
}
.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  font-size: 12px;
  color: #5F5E5A;
  align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-fill {
  width: 11px; height: 11px; border-radius: 50%;
  background: #185FA5; display: inline-block; flex-shrink: 0;
}
.legend-hollow {
  width: 11px; height: 11px; border-radius: 50%;
  background: transparent; border: 2px solid #185FA5;
  display: inline-block; flex-shrink: 0;
}
.legend-sep { border-left: 1px solid #D3D1C7; padding-left: 16px; }
.legend-dash {
  display: inline-block; width: 20px; height: 0;
  border-top: 2px dashed rgba(60,60,60,0.55); flex-shrink: 0;
}
.legend-dash-orange {
  display: inline-block; width: 20px; height: 0;
  border-top: 2px dashed rgba(150,70,0,0.75); flex-shrink: 0;
}
.chart-wrap { position: relative; width: 100%; height: 430px; }
.source {
  margin-top: 12px;
  padding: 10px 12px;
  background: #F4F3F0;
  border-radius: 6px;
  font-size: 12px;
  color: #73726C;
  line-height: 1.6;
}
.source strong { color: #1A1A18; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <p class="chart-title">부산 구·군별 고령화율과 고령인구 대비 의사 수</p>
  <p class="chart-sub">부산 16개 시군구 병원 데이터 분석 (2025년 기준)</p>

  <div class="legend">
    <div class="legend-item"><span class="legend-fill"></span>상위진료 있음</div>
    <div class="legend-item"><span class="legend-hollow"></span>상위진료 없음</div>
    <div class="legend-item legend-sep"><span class="legend-dash"></span>고령인구비율 평균</div>
    <div class="legend-item"><span class="legend-dash-orange"></span>천 명당 의사 수 중앙값</div>
  </div>

  <div class="chart-wrap">
    <canvas id="sc"></canvas>
  </div>

  <div class="source">
    <strong>데이터 출처:</strong> 건강보험심사평가원 (2025). 지역별 종별 의료인력(의사 등) · 행정안전부 (2025). 전국의료기관표준데이터 · 행정안전부 (2025). 행정동별 지역별 고령 인구현황
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const raw = [
  {gu:'강서구',   x:15.2, y:4.9,  total:8,  upper:false},
  {gu:'금정구',   x:28.4, y:5.8,  total:30, upper:false},
  {gu:'기장군',   x:20.9, y:6.8,  total:14, upper:true },
  {gu:'남구',     x:25.5, y:6.2,  total:21, upper:true },
  {gu:'동구',     x:31.1, y:14.0, total:16, upper:true },
  {gu:'동래구',   x:23.5, y:10.4, total:44, upper:true },
  {gu:'부산진구', x:23.9, y:17.0, total:43, upper:true },
  {gu:'북구',     x:25.5, y:7.2,  total:27, upper:true },
  {gu:'사상구',   x:26.6, y:7.7,  total:30, upper:true },
  {gu:'사하구',   x:26.7, y:6.2,  total:45, upper:false},
  {gu:'서구',     x:31.1, y:38.5, total:14, upper:true },
  {gu:'수영구',   x:27.0, y:9.8,  total:21, upper:true },
  {gu:'연제구',   x:24.2, y:9.1,  total:31, upper:true },
  {gu:'영도구',   x:35.1, y:4.7,  total:8,  upper:true },
  {gu:'중구',     x:34.2, y:16.5, total:7,  upper:true },
  {gu:'해운대구', x:23.5, y:11.9, total:32, upper:true },
];

const avgX = raw.reduce((s,d)=>s+d.x,0)/raw.length;
const medY = 8.4;
const BLUE = '#185FA5';
const R = 5;

const upperPts = raw.filter(d=>d.upper).map(d=>({x:d.x,y:d.y,r:R,gu:d.gu,total:d.total}));
const lowerPts = raw.filter(d=>!d.upper).map(d=>({x:d.x,y:d.y,r:R,gu:d.gu,total:d.total}));
const lowerSet = new Set(lowerPts.map(p=>p.gu));

const refPlugin = {
  id:'refLines',
  beforeDatasetsDraw(chart){
    const {ctx, chartArea:{top,bottom,left,right}, scales:{x:xS,y:yS}} = chart;
    const vx = xS.getPixelForValue(avgX);
    const hy = yS.getPixelForValue(medY);
    ctx.save();
    ctx.lineWidth = 1.5;

    ctx.setLineDash([5,4]);
    ctx.strokeStyle = 'rgba(60,60,60,0.45)';
    ctx.beginPath(); ctx.moveTo(vx,top); ctx.lineTo(vx,bottom); ctx.stroke();

    ctx.strokeStyle = 'rgba(150,70,0,0.60)';
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(left,hy); ctx.lineTo(right,hy); ctx.stroke();

    ctx.setLineDash([]);
    ctx.font = '500 10px "Noto Sans KR", sans-serif';

    ctx.fillStyle = 'rgba(60,60,60,0.70)';
    ctx.textAlign = 'left';
    ctx.fillText(`평균 ${avgX.toFixed(1)}%`, vx+4, top+12);

    ctx.fillStyle = 'rgba(140,65,0,0.85)';
    ctx.textAlign = 'right';
    ctx.fillText('중앙값 8.4명', right-4, hy-5);

    ctx.restore();
  }
};

const hollowPlugin = {
  id:'hollowPoints',
  afterDatasetsDraw(chart){
    const ctx = chart.ctx;
    const meta = chart.getDatasetMeta(1);
    meta.data.forEach(el=>{
      ctx.save();
      ctx.beginPath();
      ctx.arc(el.x, el.y, R, 0, Math.PI*2);
      ctx.fillStyle = '#FFFFFF';
      ctx.fill();
      ctx.strokeStyle = BLUE;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    });
  }
};

new Chart(document.getElementById('sc'), {
  type: 'bubble',
  data: {
    datasets: [
      {
        label:'상위진료 있음',
        data: upperPts,
        backgroundColor: 'rgba(24,95,165,0.60)',
        borderColor:     'rgba(24,95,165,0.90)',
        borderWidth: 1.5,
      },
      {
        label:'상위진료 없음',
        data: lowerPts,
        backgroundColor: 'transparent',
        borderColor:     'transparent',
        borderWidth: 0,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding:{ top:20, right:70, bottom:8, left:10 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title(items){ return items[0].raw.gu; },
          label(item){
            const d = item.raw;
            return [
              ` 고령인구비율: ${d.x}%`,
              ` 천 명당 의사 수: ${d.y}명`,
              ` 병원급 총합: ${d.total}곳`,
              ` 상위진료: ${lowerSet.has(d.gu)?'없음':'있음'}`
            ];
          }
        },
        backgroundColor: '#fff',
        titleColor: '#1A1A18',
        bodyColor: '#5F5E5A',
        borderColor: 'rgba(0,0,0,0.08)',
        borderWidth: 1,
        padding: 10,
        titleFont:{ size:13, weight:'500' },
        bodyFont:{ size:12 }
      }
    },
    scales: {
      x: {
        min:12, max:38,
        title:{ display:true, text:'고령인구비율 (%)', color:'#555', font:{ size:12, weight:'600' }, padding:{ top:6 } },
        grid:{ color:'rgba(0,0,0,0.07)' },
        ticks:{ color:'#333', font:{ size:11 }, callback: v => v+'%' }
      },
      y: {
        min:0, max:45,
        title:{ display:true, text:'고령인구 천 명당 의사 수 (명)', color:'#555', font:{ size:12, weight:'600' } },
        grid:{ color:'rgba(0,0,0,0.07)' },
        ticks:{ color:'#333', font:{ size:11 } }
      }
    }
  },
  plugins: [refPlugin, hollowPlugin]
});
</script>
</body>
</html>
